<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticando - Designer Budget Pro</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 14px;
            opacity: 0.9;
        }
        .error-container {
            text-align: center;
            color: #ff6b6b;
        }
        .error-container button {
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .error-container button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="content" class="loader">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p class="message">Aguarde enquanto processamos seu login</p>
    </div>
    
    <script src="js/auth/auth0-config.js"></script>
    <script>
        async function handleCallback() {
            try {
                await Auth0.init();
                const user = await Auth0.handleCallback();
                
                if (user) {
                    console.log('✅ Usuário autenticado:', user.email);
                    window.location.href = 'index.html';
                } else {
                    throw new Error('Falha na autenticação');
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error-container">
                        <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <h2>Erro na autenticação</h2>
                        <p>${error.message || 'Tente novamente mais tarde'}</p>
                        <button onclick="window.location.href='login.html'">Voltar para o login</button>
                    </div>
                `;
            }
        }
        
        handleCallback();
    </script>
</body>
</html>
