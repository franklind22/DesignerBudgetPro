<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Designer Budget Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #2d8a8a; --primary-dark: #1e5f5f; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .dark .login-card { background: rgba(31, 41, 55, 0.95); }
        .btn-primary {
            background-color: var(--primary);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in">
        <div class="login-card p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-primary text-white flex items-center justify-center text-3xl shadow-lg">
                    <i class="fa-solid fa-palette"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Designer Budget Pro</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Sistema de Orçamentos e Gestão para Designers</p>
            </div>
            
            <!-- Botões de Login Social -->
            <div class="space-y-3">
                <button onclick="loginWithGoogle()" class="w-full py-3 px-4 rounded-xl border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium flex items-center justify-center gap-3 hover:border-primary hover:text-primary transition-all">
                    <i class="fa-brands fa-google text-lg"></i>
                    Continuar com Google
                </button>
                
                <button onclick="loginWithGitHub()" class="w-full py-3 px-4 rounded-xl border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium flex items-center justify-center gap-3 hover:border-primary hover:text-primary transition-all">
                    <i class="fa-brands fa-github text-lg"></i>
                    Continuar com GitHub
                </button>
            </div>
            
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">ou</span>
                </div>
            </div>
            
            <!-- Login com E-mail (via Auth0 Universal Login) -->
            <button onclick="loginWithEmail()" class="w-full py-3 px-4 rounded-xl btn-primary text-white font-medium flex items-center justify-center gap-3">
                <i class="fa-regular fa-envelope text-lg"></i>
                Entrar com e-mail
            </button>
            
            <!-- Footer -->
            <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 text-center">
                <p class="text-xs text-gray-500">
                    <i class="fa-solid fa-shield-alt text-primary mr-1"></i>
                    Autenticação segura com Auth0
                </p>
                <p class="text-xs text-gray-400 mt-2">
                    Ao continuar, você concorda com nossos Termos de Uso
                </p>
            </div>
        </div>
        
        <div id="toast-message" class="fixed bottom-4 right-4 hidden px-4 py-2 rounded-lg text-white text-sm shadow-lg"></div>
    </div>
    
    <script src="js/auth/auth0-config.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-message');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white text-sm shadow-lg ${colors[type]}`;
            toast.innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        async function loginWithGoogle() {
            try {
                await Auth0.init();
                Auth0.loginWithGoogle();
            } catch (error) {
                showToast('Erro ao conectar com Auth0', 'error');
                console.error(error);
            }
        }
        
        async function loginWithGitHub() {
            try {
                await Auth0.init();
                Auth0.loginWithGitHub();
            } catch (error) {
                showToast('Erro ao conectar com Auth0', 'error');
                console.error(error);
            }
        }
        
        async function loginWithEmail() {
            try {
                await Auth0.init();
                Auth0.login();
            } catch (error) {
                showToast('Erro ao conectar com Auth0', 'error');
                console.error(error);
            }
        }
        
        // Verificar se já está logado (evitar loop)
        if (Auth0.isAuthenticated() && Auth0.getCurrentUser()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
