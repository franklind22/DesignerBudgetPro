<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Designer Budget Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #2d8a8a; --primary-dark: #1e5f5f; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .dark .login-card { background: rgba(31, 41, 55, 0.95); }
        .btn-primary {
            background-color: var(--primary);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in">
        <div class="login-card p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-primary text-white flex items-center justify-center text-3xl shadow-lg">
                    <i class="fa-solid fa-palette"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Designer Budget Pro</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Sistema de Orçamentos e Gestão para Designers</p>
            </div>
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-medium border-b-2 border-primary text-primary transition-all">
                    Entrar
                </button>
                <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-all">
                    Cadastrar
                </button>
            </div>
            
            <!-- Formulário de Login -->
            <div id="form-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                    <input type="email" id="login-email" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                    <input type="password" id="login-password" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="••••••">
                </div>
                <button onclick="submitLogin()" class="w-full btn-primary text-white py-2 rounded-lg font-medium transition-all">Entrar</button>
            </div>
            
            <!-- Formulário de Cadastro -->
            <div id="form-register" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome</label>
                    <input type="text" id="register-name" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Seu nome">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                    <input type="email" id="register-email" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                    <input type="password" id="register-password" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Mínimo 6 caracteres">
                </div>
                <button onclick="submitRegister()" class="w-full btn-primary text-white py-2 rounded-lg font-medium transition-all">Criar Conta</button>
            </div>
            
            <!-- Demo -->
            <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 text-center">
                <button onclick="createDemoAccount()" class="text-xs text-primary hover:underline">
                    <i class="fa-solid fa-flask mr-1"></i> Criar conta demo
                </button>
            </div>
        </div>
        
        <div id="toast-message" class="fixed bottom-4 right-4 hidden px-4 py-2 rounded-lg text-white text-sm shadow-lg"></div>
    </div>
    
    <script src="js/auth/auth-simple.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-message');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white text-sm shadow-lg ${colors[type]}`;
            toast.innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('border-primary', 'text-primary');
                loginTab.classList.remove('border-transparent', 'text-gray-500');
                registerTab.classList.remove('border-primary', 'text-primary');
                registerTab.classList.add('border-transparent', 'text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('border-primary', 'text-primary');
                registerTab.classList.remove('border-transparent', 'text-gray-500');
                loginTab.classList.remove('border-primary', 'text-primary');
                loginTab.classList.add('border-transparent', 'text-gray-500');
            }
        }
        
        async function submitLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showToast('Preencha e-mail e senha', 'error');
                return;
            }
            
            try {
                const user = await Auth.login(email, password);
                showToast(`Bem-vindo, ${user.name}!`, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function submitRegister() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            
            if (!name || !email || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }
            
            try {
                const user = await Auth.register(email, password, name);
                showToast(`Conta criada! Bem-vindo, ${user.name}!`, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function createDemoAccount() {
            try {
                const user = await Auth.createDemoUser();
                showToast('Conta demo criada! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        // ✅ NÃO FAZER REDIRECIONAMENTO AUTOMÁTICO AQUI
        // Apenas se o usuário já estiver logado, redireciona (opcional, mas causa loop)
        // Removido para evitar loop
    </script>
</body>
</html>
